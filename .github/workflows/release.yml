name: Stellar Expert WASM Release
on:
  push: 
    tags:
      - 'v*'  # triggered whenever a new tag (previxed with "v") is pushed to the repository
jobs:
  release-contract-bridgeoracle:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'Orbit Bridge-Oracle Release'
      package: 'bridge-oracle'
      make_target: 'build'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  release-contract-treasury:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'Orbit Treasury Release'
      package: 'treasury'
      make_target: 'build'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  release-contract-treasury-factory:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'Orbit Treasury Factory Release'
      package: 'treasury-factory'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}